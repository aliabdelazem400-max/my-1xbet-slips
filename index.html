<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موثق القسائم - الفئات المالية</title>
    <style>
        :root {
            --primary: #ffcc00;
            --secondary: #28a745;
            --telegram: #0088cc;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1541252260730-0412e8e2108e?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed;
            color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header { padding: 40px 20px; text-align: center; }
        .logo { width: 80px; height: 80px; background: var(--primary); border-radius: 15px; display: inline-block; line-height: 80px; font-size: 2em; font-weight: 900; color: #000; margin-bottom: 15px; box-shadow: 0 0 20px rgba(255,204,0,0.4); }
        
        .btn-main { background: var(--primary); color: #000; border: none; padding: 15px 30px; font-size: 1.1em; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; margin: 5px; }
